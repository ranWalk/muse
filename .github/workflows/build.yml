name: Build Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/ranwalk/muse

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      MUSE_APP_DEPLOY_TOKEN: ${{ secrets.MUSE_APP_DEPLOY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Trigger deployment repository
        if: ${{ github.ref == 'refs/heads/main' && env.MUSE_APP_DEPLOY_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ env.MUSE_APP_DEPLOY_TOKEN }}
        run: |
          gh api repos/ranWalk/muse-app/dispatches \
            --method POST \
            --field event_type=muse_image_published \
            --field client_payload[image]="${IMAGE_NAME}:${GITHUB_SHA}"
